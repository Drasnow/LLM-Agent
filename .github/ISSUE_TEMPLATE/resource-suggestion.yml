name: Resource suggestion
description: Recommend a new learning resource for this repository.
title: "[Resource] "
labels:
  - resource
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for recommending a resource. Please make sure it is public, useful, and strongly related to LLM / RAG / Agent learning.
  - type: input
    id: resource_name
    attributes:
      label: Resource name
      placeholder: e.g. Hugging Face Agents Course
    validations:
      required: true
  - type: input
    id: resource_url
    attributes:
      label: Resource URL
      placeholder: https://...
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - LLM 基础
        - Prompt / 应用开发
        - RAG / 知识库
        - Agent / Workflow
        - 课程 / 教程
        - 导航 / Awesome
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly explain what this resource is.
      placeholder: 1-3 sentences
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Best for
      description: Who is this resource best for?
      placeholder: Beginner, advanced users, RAG engineers, etc.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why it should be included
      description: Explain its value and why it is different from existing resources.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched the repository and did not find an equivalent duplicate
          required: true
        - label: I verified the resource is publicly accessible
          required: true
